services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: todowka-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/todowka.db
      - SECRET_KEY=${SECRET_KEY:-changeme-generate-random-string-64-chars}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - REGISTRATION_ENABLED=${REGISTRATION_ENABLED:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://localhost,https://www.localhost}
      - APP_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - todowka-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: todowka-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_APP_NAME=${VITE_APP_NAME:-Todowka}
    networks:
      - todowka-network

  nginx:
    image: nginx:alpine
    container_name: todowka-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:z
      - ./certbot/conf:/etc/letsencrypt:z
      - ./certbot/www:/var/www/certbot:z
    depends_on:
      - frontend
      - backend
      - certbot
    restart: unless-stopped
    networks:
      - todowka-network

  certbot:
    image: certbot/certbot
    container_name: todowka-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt:z
      - ./certbot/www:/var/www/certbot:z
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - todowka-network

volumes:
  backend-data:
    driver: local
  certbot-conf:

networks:
  todowka-network:
    driver: bridge